<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Widget</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #35485A;
            font-family: Arial, sans-serif;
        }
        .weather-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
    </style>
</head>
<body>
    <img src="your-image-url.jpg" alt="Weather Forecast & Widgets" class="weather-image">
</body>
</html>
