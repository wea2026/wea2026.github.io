<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Widget</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #35485A;
            font-family: Arial, sans-serif;
            min-height: 100vh; /* 确保body占满视口高度 */
        }
        .weather-image {
            position: absolute;
            top: 0;
            left: 0;
            /* 使用视口百分比单位（vw/vh）实现自适应 */
            width: 30vw; /* 宽度为窗口宽度的30% */
            max-width: 500px; /* 限制最大宽度，避免太大 */
            height: auto; /* 高度自动，保持图片比例 */
            /* 可选：添加一点内边距，避免贴边 */
            padding: 10px;
            box-sizing: border-box;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- 同级目录的图片文件名 -->
    <img src="title.png" alt="Weather Forecast & Widgets" class="weather-image">
</body>
</html>
